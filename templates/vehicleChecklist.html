<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @page { size: A4; margin: 10mm; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #111827;
      font-family: Roboto, Arial, sans-serif;
      font-size: 12px;
      line-height: 1.45;
    }
    .title { margin: 0 0 4px; font-size: 20px; font-weight: 700; }
    .description { margin: 0 0 18px; color: rgba(0,0,0,0.62); }
    .item {
      padding: 14px 0 18px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      page-break-inside: avoid;
    }
    .item-header {
      display: table;
      width: 100%;
      table-layout: fixed;
      margin-bottom: 10px;
    }
    .check, .label { display: table-cell; vertical-align: middle; }
    .check { width: 36px; }
    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #fb8c00;
      border-radius: 5px;
      display: inline-block;
      position: relative;
      background: #fff;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    }
    .checkbox.is-checked::after {
      content: "";
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 9px;
      border: solid #fb8c00;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .label-text { font-size: 14px; font-weight: 600; }
    .observation {
      margin: 10px 0 0 36px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #fff7ed;
      border: 1px solid rgba(251, 146, 60, 0.18);
      color: rgba(0,0,0,0.68);
    }
    .photos { margin: 12px 0 0 36px; }
    .photos-grid {
      display: block;
      width: 100%;
      font-size: 0;
    }
    .photo-cell {
      display: inline-block;
      width: 23%;
      margin: 0 1% 10px 0;
      vertical-align: top;
    }
    .photo-frame {
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      overflow: hidden;
      height: 128px;
      background: #f8fafc;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }
    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <h1 class="title">{{title}}</h1>
  <p class="description">{{description}}</p>
  {{#items}}
  <section class="item">
    <div class="item-header">
      <div class="check"><span class="checkbox {{#checked}}is-checked{{/checked}}"></span></div>
      <div class="label"><div class="label-text">{{label}}</div></div>
    </div>
    {{#photos.length}}
    <div class="photos">
      <div class="photos-grid">
        {{#photos}}
        <div class="photo-cell">
          <div class="photo-frame"><img src="{{url}}" alt="{{name}}" /></div>
        </div>
        {{/photos}}
      </div>
    </div>
    {{/photos.length}}
    {{#observacao}}
    <div class="observation"><strong>Observação:</strong> {{observacao}}</div>
    {{/observacao}}
  </section>
  {{/items}}
</body>
</html>
